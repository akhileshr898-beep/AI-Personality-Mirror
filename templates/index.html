<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Personality Mirror</title>

    <style>

        body {
            background: #111827;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        video {
            width: 800px;
            border-radius: 20px;
            border: 4px solid #00ff88;
            margin-top: 30px;
        }

        button {
            padding: 15px 35px;
            font-size: 20px;
            background: #00ff88;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
        }

            button:hover {
                background: #00cc6d;
            }
    </style>

</head>

<body>

    <h1>AI Personality Mirror</h1>

    <button onclick="startCamera()">Start Camera</button>

    <br><br>

    <video id="video" autoplay playsinline></video>

    <script>

        async function startCamera() {

            try {

                const stream = await navigator.mediaDevices.getUserMedia({

                    video: true,
                    audio: false

                });

                const video = document.getElementById("video");

                video.srcObject = stream;

            }

            catch (error) {

                alert("Camera Permission Denied");

                console.log(error);

            }

        }

    </script>

</body>

</html>
